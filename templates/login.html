<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - OutfitAI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#4F46E5', // Indigo 600
                        primaryHover: '#4338CA', // Indigo 700
                        secondary: '#64748B', // Slate 500
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer components {
            /* Input Fields */
            .form-input {
                @apply w-full px-4 py-3 rounded-lg border border-slate-300 bg-white text-slate-900 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder-slate-400;
            }
            
            /* Primary Button */
            .btn-primary {
                @apply w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-primary hover:bg-primaryHover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all;
            }

            /* Social Buttons */
            .btn-social {
                @apply w-full flex items-center justify-center gap-3 px-4 py-2.5 border rounded-lg shadow-sm text-sm font-medium bg-white hover:bg-slate-50 transition-all focus:outline-none focus:ring-2 focus:ring-offset-1;
            }
            .btn-google {
                @apply text-slate-700 border-slate-300;
            }
            .btn-apple {
                @apply bg-black text-white border-transparent hover:bg-gray-900;
            }

            /* Transition Base for JS Toggling */
            .auth-card {
                @apply transition-all duration-300 ease-in-out;
            }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8 antialiased font-sans">

    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center mb-8">
        <div class="inline-flex items-center justify-center w-12 h-12 bg-primary rounded-xl text-white text-xl font-bold shadow-lg shadow-indigo-200 mb-4">
            <i class="fa-solid fa-shirt"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">
            OutfitAI
        </h2>
        <p class="mt-2 text-sm text-slate-600">
            Your personal AI stylist and wardrobe manager.
        </p>
    </div>

    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow-xl shadow-slate-200 sm:rounded-2xl sm:px-10 border border-slate-100 relative overflow-hidden">
            
            <div id="login-container" class="auth-card">
                <h3 class="text-xl font-bold text-slate-900 mb-6">Sign in to your account</h3>
                
                <form id="login-form" class="space-y-6">
                    <div>
                        <label for="login-email" class="block text-sm font-medium text-slate-700 mb-1">Email address</label>
                        <input type="email" id="login-email" required placeholder="you@example.com" class="form-input">
                    </div>

                    <div>
                        <label for="login-password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                        <input type="password" id="login-password" required placeholder="••••••••" class="form-input">
                    </div>

                    <button type="button" id="btn-login" class="btn-primary">
                        Sign In
                    </button>
                </form>

                <p id="auth-error-login" class="mt-4 text-center text-sm text-red-600 font-medium min-h-[20px]"></p>

                <div class="mt-6">
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-slate-200"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-2 bg-white text-slate-500">Or continue with</span>
                        </div>
                    </div>

                    <div class="mt-6 grid grid-cols-1 gap-3">
                        <button type="button" id="btn-google-login" class="btn-social btn-google">
                            <svg class="h-5 w-5" aria-hidden="true" viewBox="0 0 18 18"><path d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.67 7.67 0 0 0 2.44-5.77c0-.59-.05-1.18-.15-1.76Z" fill="#4285F4"></path><path d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.87 4.87 0 0 1-2.7 1.01c-2.08 0-3.84-1.38-4.48-3.24H1.86v2.07A8 8 0 0 0 8.98 17Z" fill="#34A853"></path><path d="M4.5 10.52a4.84 4.84 0 0 1 0-3.04V5.41H1.86a8 8 0 0 0 0 7.18l2.64-2.07Z" fill="#FBBC05"></path><path d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.86 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3Z" fill="#EA4335"></path></svg>
                            Google
                        </button>
                        
                        <button type="button" id="btn-apple-login" class="btn-social btn-apple">
                            <svg class="h-5 w-5 text-white" aria-hidden="true" fill="currentColor" viewBox="0 0 24 24"><path d="M12.012 15.345c-.32 0-.64-.047-.949-.138-1.71-.534-3.66-1.503-3.66-4.463 0-2.88 1.93-4.323 3.65-4.323.94 0 1.63.483 2.19.483.56 0 1.41-.534 2.37-.534 1.9 0 3.32 1.187 3.32 3.493 0 1.543-.78 3.012-1.66 4.018-.76.9-1.28 1.802-1.28 2.87 0 .28-.008.56-.023.832-.802.264-1.65.362-2.558.158zm4.493-13.34c.008-.666.526-1.11 1.09-1.133.05-.002.102-.002.152-.002.66 0 1.25.46 1.25 1.09 0 .64-.54 1.13-1.21 1.13-.6 0-1.21-.46-1.28-1.085zM20.94 10.15c-.06-3.12-2.34-4.834-4.66-4.834-1.21 0-2.31.64-3.05 1.23-.84.67-1.49 1.8-1.49 1.8s-.59-1.13-1.48-1.8c-.76-.58-1.86-1.23-3.06-1.23-2.35 0-4.62 1.714-4.62 4.834 0 3.2 2.76 6.83 5.48 6.83.91 0 1.77-.4 2.47-.4.67 0 1.34.4 2.43.4 2.89 0 5.42-3.6 5.42-6.83z"></path></svg>
                            Apple
                        </button>
                    </div>
                </div>

                <div class="mt-8 text-center">
                    <p class="text-sm text-slate-600">
                        Don't have an account? 
                        <a id="show-register" class="font-medium text-primary hover:text-primaryHover cursor-pointer hover:underline">Register here</a>
                    </p>
                </div>
            </div>

            <div id="register-container" class="auth-card hidden opacity-0 translate-y-4">
                <h3 class="text-xl font-bold text-slate-900 mb-6">Create your account</h3>
                
                <form id="register-form" class="space-y-5">
                    <div>
                        <label for="reg-name" class="block text-sm font-medium text-slate-700 mb-1">Display Name</label>
                        <input type="text" id="reg-name" required placeholder="Your Name" class="form-input">
                    </div>

                    <div>
                        <label for="reg-email" class="block text-sm font-medium text-slate-700 mb-1">Email address</label>
                        <input type="email" id="reg-email" required placeholder="you@example.com" class="form-input">
                    </div>

                    <div>
                        <label for="reg-password" class="block text-sm font-medium text-slate-700 mb-1">Password (min. 6 characters)</label>
                        <input type="password" id="reg-password" required placeholder="••••••••" class="form-input">
                    </div>

                    <button type="button" id="btn-register" class="btn-primary mt-2">
                        Create Account
                    </button>
                </form>

                <p id="auth-error-register" class="mt-4 text-center text-sm text-red-600 font-medium min-h-[20px]"></p>

                <div class="mt-6 text-center">
                    <p class="text-sm text-slate-600">
                        Already have an account? 
                        <a id="show-login" class="font-medium text-primary hover:text-primaryHover cursor-pointer hover:underline">Sign in</a>
                    </p>
                </div>
            </div>

        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="/static/js/login.js"></script>
</body>
</html>
