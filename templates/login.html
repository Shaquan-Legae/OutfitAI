<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - OutfitAI</title>
    <link rel="stylesheet" href="/static/css/login.css">
    <!-- Common CSS might be needed if it defines card styles, otherwise remove -->
    <!-- <link rel="stylesheet" href="/static/css/common.css"> -->
</head>
<body>
    <div class="auth-container">

        <!-- Login Card -->
        <div class="card auth-card" id="login-container">
            <h2 class="card-title">OutfitAI Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="button" id="btn-login" class="btn btn-primary">Login</button>

                <div class="social-logins">
                    <p class="divider"><span>or continue with</span></p>
                    <button type="button" id="btn-google-login" class="btn btn-social btn-google">
                        <svg aria-hidden="true" width="18" height="18" viewBox="0 0 18 18"><path d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.67 7.67 0 0 0 2.44-5.77c0-.59-.05-1.18-.15-1.76Z" fill="#4285F4"></path><path d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.87 4.87 0 0 1-2.7 1.01c-2.08 0-3.84-1.38-4.48-3.24H1.86v2.07A8 8 0 0 0 8.98 17Z" fill="#34A853"></path><path d="M4.5 10.52a4.84 4.84 0 0 1 0-3.04V5.41H1.86a8 8 0 0 0 0 7.18l2.64-2.07Z" fill="#FBBC05"></path><path d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.86 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3Z" fill="#EA4335"></path></svg>
                        Sign in with Google
                    </button>
                    <!-- Apple Login Button -->
                    <button type="button" id="btn-apple-login" class="btn btn-social btn-apple">
                         <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24"><path d="M12.012 15.345c-.32 0-.64-.047-.949-.138-1.71-.534-3.66-1.503-3.66-4.463 0-2.88 1.93-4.323 3.65-4.323.94 0 1.63.483 2.19.483.56 0 1.41-.534 2.37-.534 1.9 0 3.32 1.187 3.32 3.493 0 1.543-.78 3.012-1.66 4.018-.76.9-1.28 1.802-1.28 2.87 0 .28-.008.56-.023.832-.802.264-1.65.362-2.558.158zm4.493-13.34c.008-.666.526-1.11 1.09-1.133.05-.002.102-.002.152-.002.66 0 1.25.46 1.25 1.09 0 .64-.54 1.13-1.21 1.13-.6 0-1.21-.46-1.28-1.085zM20.94 10.15c-.06-3.12-2.34-4.834-4.66-4.834-1.21 0-2.31.64-3.05 1.23-.84.67-1.49 1.8-1.49 1.8s-.59-1.13-1.48-1.8c-.76-.58-1.86-1.23-3.06-1.23-2.35 0-4.62 1.714-4.62 4.834 0 3.2 2.76 6.83 5.48 6.83.91 0 1.77-.4 2.47-.4.67 0 1.34.4 2.43.4 2.89 0 5.42-3.6 5.42-6.83z" fill="currentColor"></path></svg>
                        Sign in with Apple
                    </button>
                </div>

                <div class="toggle-form">
                    <p>No account? <a id="show-register">Register here</a></p>
                </div>
            </form>
            <p id="auth-error-login" class="auth-error"></p> <!-- Specific error for login -->
        </div>

        <!-- Register Card -->
        <div class="card auth-card" id="register-container" style="display: none;">
            <h2 class="card-title">Create Account</h2>
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-name">Display Name</label>
                    <input type="text" id="reg-name" required placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password (min. 6 characters)</label>
                    <input type="password" id="reg-password" required placeholder="••••••••">
                </div>
                <button type="button" id="btn-register" class="btn btn-primary">Create Account</button>

                <div class="toggle-form">
                    <p>Already have an account? <a id="show-login">Login here</a></p>
                </div>
            </form>
            <p id="auth-error-register" class="auth-error"></p> <!-- Specific error for register -->
        </div>

    </div>

    <!-- Firebase JS -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/login.js"></script>
</body>
</html>
