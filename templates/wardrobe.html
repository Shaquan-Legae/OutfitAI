<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wardrobe - OutfitAI</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            primary: '#4F46E5',
            primaryHover: '#4338CA',
            secondary: '#64748B',
            laundry: '#F59E0B',
            surface: '#F1F5F9',
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out forwards',
            'slide-up': 'slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards'
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
            slideUp: { '0%': { transform: 'translateY(100%)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }
          }
        }
      }
    }
  </script>

  <style type="text/tailwindcss">
    @layer components {
      /* Layout Utils */
      .card { @apply bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden; }
      
      /* Buttons */
      .btn { @apply inline-flex justify-center items-center px-4 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:opacity-50 disabled:cursor-not-allowed; }
      .btn-primary { @apply bg-primary text-white hover:bg-primaryHover shadow-md shadow-indigo-100 focus:ring-primary; }
      .btn-secondary { @apply bg-white text-slate-700 border border-slate-200 hover:bg-slate-50 focus:ring-slate-200; }
      
      /* Inputs */
      .form-input { @apply mt-1 block w-full px-4 py-2.5 bg-surface border border-slate-200 rounded-xl text-sm text-slate-800 shadow-sm focus:bg-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all; }

      /* --- ITEM CARD (Optimized for Carousels) --- */
      /* Fixed width w-32 (128px) x h-40 (160px) */
      .item-card { 
        @apply relative group bg-white rounded-xl overflow-hidden border border-slate-200 shadow-sm transition-all duration-300 flex-shrink-0 w-32 h-40 snap-start select-none cursor-pointer; 
      }
      
      .item-card:hover { @apply -translate-y-2 shadow-lg ring-2 ring-primary/10; }
      .item-card img { @apply w-full h-full object-cover transition-transform duration-500 group-hover:scale-110; }
      
      /* Overlay */
      .item-card-overlay {
        @apply absolute inset-0 bg-gradient-to-t from-slate-900/90 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-3 text-left;
      }
      
      .item-name { @apply text-xs font-bold text-white truncate translate-y-2 group-hover:translate-y-0 transition-transform duration-300 delay-75; }

      /* Selection Checkbox */
      .select-checkbox {
        @apply absolute top-2 left-2 z-30 w-5 h-5 rounded-full border border-white/40 bg-black/40 text-white flex items-center justify-center transition-all opacity-0 group-hover:opacity-100 backdrop-blur-sm scale-90;
      }
      
      /* Selected State */
      .item-card.selected { @apply ring-2 ring-primary border-primary translate-y-[-4px]; }
      .item-card.selected .select-checkbox { @apply opacity-100 bg-primary border-primary scale-100; }
      .item-card.selected .item-card-overlay { @apply opacity-100; }

      /* Laundry State */
      .item-card.is-laundry { @apply border-amber-300 bg-amber-50; }
      .item-card.is-laundry img { @apply grayscale opacity-70; }
      .item-card.is-laundry .wash-btn { @apply bg-amber-500 text-white hover:bg-amber-600 opacity-100; }
      .item-card.is-laundry .item-card-overlay { @apply from-amber-900/80; }

      /* Hover Actions (Wash Button) */
      .wash-btn { 
        @apply absolute top-2 right-2 z-30 w-7 h-7 rounded-full bg-white/20 backdrop-blur-md text-white flex items-center justify-center border border-white/30 opacity-0 group-hover:opacity-100 transition-all duration-200 hover:bg-white hover:text-primary transform translate-y-[-5px] group-hover:translate-y-0; 
      }

      /* --- FILTERS --- */
      .filter-btn { @apply px-4 py-1.5 rounded-full text-xs font-semibold border transition-all whitespace-nowrap select-none; }
      .filter-btn.active { @apply bg-slate-900 text-white border-slate-900 shadow-md; }
      .filter-btn.inactive { @apply bg-white text-slate-500 border-slate-200 hover:border-slate-300 hover:bg-slate-50 hover:text-slate-800; }
      
      /* --- FLOATING SELECTION BAR --- */
      .selection-bar {
        @apply fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-900/95 backdrop-blur-sm text-white px-6 py-3 rounded-full shadow-2xl z-50 flex items-center gap-6 animate-slide-up border border-white/10;
      }
    }
    
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>

<body class="bg-surface text-slate-800 antialiased min-h-screen flex flex-col">

  <nav class="bg-white/90 backdrop-blur border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center gap-8">
          <a href="/" class="flex-shrink-0 flex items-center gap-2 group">
            <div
              class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white font-bold shadow-sm group-hover:scale-105 transition-transform">
              <i class="fa-solid fa-shirt"></i>
            </div>
            <span class="text-lg font-bold tracking-tight text-slate-900">OutfitAI</span>
          </a>
          <div class="hidden sm:flex sm:space-x-1">
            <a href="/"
              class="text-slate-500 hover:text-primary hover:bg-indigo-50 px-3 py-2 rounded-lg text-sm font-medium transition-colors">Home</a>
            <a href="/wardrobe" class="text-primary bg-indigo-50 px-3 py-2 rounded-lg text-sm font-medium"
              aria-current="page">My Wardrobe</a>
            <a href="/recommendations"
              class="text-slate-500 hover:text-primary hover:bg-indigo-50 px-3 py-2 rounded-lg text-sm font-medium transition-colors">Suggestions</a>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <span class="text-sm text-slate-600 hidden md:block">Welcome, <span class="font-semibold text-slate-900">{{
              user.name }}</span></span>
          <a href="/logout" class="text-sm text-slate-500 hover:text-red-600 transition-colors font-medium">
            <i class="fa-solid fa-arrow-right-from-bracket mr-1"></i>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-grow relative">

    <div class="flex flex-col sm:flex-row sm:items-end justify-between mb-8 gap-4">
      <div>
        <h1 class="text-2xl font-bold text-slate-900 tracking-tight">My Wardrobe</h1>
        <p class="mt-1 text-sm text-slate-500">Manage your collection, upload items, and track laundry.</p>
      </div>
      <div class="flex gap-2">
        <button id="toggle-selection-btn" class="btn btn-secondary text-xs">
          <i class="fa-regular fa-square-check mr-2"></i> Select Items
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">

      <div class="lg:col-span-4 space-y-6 lg:sticky lg:top-24 z-30">

        <div class="card p-5">
          <h2 class="text-xs font-bold text-slate-400 mb-4 flex items-center gap-2 uppercase tracking-wide">
            Add New Item
          </h2>

          <form id="upload-form">
            <div id="drop-zone"
              class="border-2 border-dashed border-slate-300 rounded-xl p-6 text-center cursor-pointer hover:border-primary hover:bg-indigo-50/30 transition-all duration-200 group bg-slate-50">
              <div class="flex flex-col items-center justify-center">
                <i
                  class="fa-solid fa-cloud-arrow-up text-2xl text-slate-400 mb-2 group-hover:text-primary transition-colors"></i>
                <p class="text-xs text-slate-600 font-medium">Click or drag image</p>
              </div>
            </div>
            <input type="file" id="file-input" name="file" accept="image/*" class="hidden">

            <div id="preview-area" class="hidden mt-4 relative group">
              <img id="image-preview" src="#" alt="Preview"
                class="w-full h-40 object-cover rounded-lg border border-slate-200">
              <button type="button" id="cancel-preview"
                class="absolute top-2 right-2 bg-white/90 text-slate-600 hover:text-red-600 rounded-full w-6 h-6 flex items-center justify-center shadow-md transition-all">
                <i class="fa-solid fa-xmark text-xs"></i>
              </button>
            </div>

            <div id="item-details-form" class="hidden space-y-3 mt-4 animate-fade-in">
              <input type="text" id="item-name" name="item_name" required placeholder="Item Name" class="form-input">
              <div class="relative">
                <select id="item-category" name="item_category" required
                  class="form-input appearance-none cursor-pointer">
                  <option value="" disabled selected>Category...</option>
                  <option value="Tops">Tops</option>
                  <option value="Sweaters & Hoodies">Sweaters</option>
                  <option value="Jackets & Coats">Jackets</option>
                  <option value="Pants">Pants</option>
                  <option value="Shorts & Skirts">Shorts</option>
                  <option value="Dresses & Jumpsuits">Dresses</option>
                  <option value="Shoes">Shoes</option>
                  <option value="Accessories">Accessories</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-500"><i
                    class="fa-solid fa-chevron-down text-xs"></i></div>
              </div>
              <div
                class="flex items-center gap-2 p-2.5 bg-amber-50/50 rounded-lg border border-amber-100 cursor-pointer hover:bg-amber-50">
                <input type="checkbox" id="in-laundry-checkbox" name="in_laundry"
                  class="w-4 h-4 text-amber-500 rounded focus:ring-amber-500 cursor-pointer">
                <label for="in-laundry-checkbox"
                  class="text-xs font-medium text-slate-700 cursor-pointer select-none">Add to Laundry Basket</label>
              </div>
              <button type="submit" id="submit-button" class="btn btn-primary w-full py-2.5 shadow-md shadow-indigo-100"
                disabled>Add Item</button>
            </div>
            <p id="upload-status" class="text-center text-[10px] mt-2 font-semibold h-3"></p>
          </form>
        </div>

        <div id="laundry-basket-card"
          class="card p-5 border-l-4 border-l-laundry bg-gradient-to-br from-amber-50/50 to-white">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-xs font-bold text-amber-600 flex items-center gap-2 uppercase tracking-wide">
              <i class="fa-solid fa-basket-shopping text-laundry"></i> Laundry Basket
            </h2>
            <span id="laundry-count"
              class="bg-white text-amber-600 border border-amber-100 text-[10px] font-bold px-2 py-0.5 rounded-full">0</span>
          </div>

          <div class="relative group/carousel">
            <button id="laundry-scroll-left"
              class="absolute -left-2 top-1/2 -translate-y-1/2 z-20 w-7 h-7 bg-white shadow-md rounded-full flex items-center justify-center text-slate-400 hover:text-primary opacity-0 group-hover/carousel:opacity-100 transition-all disabled:opacity-0"><i
                class="fa-solid fa-chevron-left text-[10px]"></i></button>

            <div id="laundry-items-carousel"
              class="flex gap-3 overflow-x-auto hide-scroll pb-2 snap-x scroll-smooth min-h-[80px] items-center">
              <p id="laundry-empty" class="text-xs text-slate-400 italic w-full text-center">Basket is clean.</p>
            </div>

            <button id="laundry-scroll-right"
              class="absolute -right-2 top-1/2 -translate-y-1/2 z-20 w-7 h-7 bg-white shadow-md rounded-full flex items-center justify-center text-slate-400 hover:text-primary opacity-0 group-hover/carousel:opacity-100 transition-all disabled:opacity-0"><i
                class="fa-solid fa-chevron-right text-[10px]"></i></button>
          </div>
        </div>
      </div>

      <div class="lg:col-span-8">
        <div class="card p-6 min-h-[600px] bg-white">

          <div class="sticky top-0 bg-white z-20 pb-4 pt-1 border-b border-slate-100 mb-6">
            <div class="flex items-center gap-2 overflow-x-auto hide-scroll pb-1" id="category-filters">
            </div>
          </div>

          <div id="gallery-container" class="space-y-8">
            <div id="gallery-loading" class="flex flex-col items-center justify-center py-20 text-slate-400">
              <i class="fa-solid fa-circle-notch fa-spin text-2xl mb-3 text-primary"></i>
              <p class="text-sm font-medium">Organizing your closet...</p>
            </div>
            <div id="gallery-empty" class="hidden flex flex-col items-center justify-center py-20 text-center">
              <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mb-4"><i
                  class="fa-solid fa-hanger text-2xl text-slate-300"></i></div>
              <h3 class="text-sm font-bold text-slate-900">Closet Empty</h3>
              <p class="text-xs text-slate-500 mt-1">Time to go shopping (or uploading)!</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="selection-bar" class="hidden selection-bar">

    <div class="flex items-center gap-3 border-r border-slate-700 pr-4 mr-2">
      <label class="flex items-center gap-2 cursor-pointer group">
        <div class="relative">
          <input type="checkbox" id="select-all-radio" class="peer sr-only">
          <div
            class="w-4 h-4 rounded-full border border-slate-400 peer-checked:bg-primary peer-checked:border-primary transition-all">
          </div>
          <div
            class="absolute inset-0 flex items-center justify-center text-white scale-0 peer-checked:scale-100 transition-transform text-[8px]">
            <i class="fa-solid fa-check"></i></div>
        </div>
        <span class="text-xs font-medium text-slate-300 group-hover:text-white transition-colors">All</span>
      </label>
    </div>

    <span class="text-sm font-semibold whitespace-nowrap"><span id="selected-count" class="text-primary">0</span>
      Selected</span>

    <div class="flex items-center gap-2 ml-auto">
      <button id="batch-wash-btn"
        class="w-9 h-9 rounded-full bg-slate-800 hover:bg-amber-500 hover:text-white text-amber-400 transition-all flex items-center justify-center"
        title="Toggle Laundry">
        <i class="fa-solid fa-jug-detergent text-xs"></i>
      </button>
      <button id="batch-delete-btn"
        class="w-9 h-9 rounded-full bg-slate-800 hover:bg-red-500 hover:text-white text-red-400 transition-all flex items-center justify-center"
        title="Delete">
        <i class="fa-solid fa-trash-can text-xs"></i>
      </button>
    </div>

    <button id="cancel-selection-btn"
      class="bg-white text-slate-900 hover:bg-slate-200 px-4 py-1.5 rounded-full text-xs font-bold ml-2">Done</button>
  </div>

  <script src="/static/js/wardrobe.js"></script>
</body>

</html>
